# Local / staging stack — API + MongoDB + Redis.
# Production: run DB/cache as managed services; keep same env var names.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: copilotx
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
